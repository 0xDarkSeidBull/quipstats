<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuipStats — Live Network</title>
<style>
:root {
  --bg: #0a0a0f; --surface: #111118; --border: #1e1e2e;
  --text: #e2e2f0; --muted: #6b6b8a; --accent: #7c6aff;
  --green: #1db96a; --red: #e24b4b; --cpu: #378add; --gpu: #1db96a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'SF Mono','Fira Code',monospace; font-size: 14px; min-height: 100vh; }

header { padding: 1.2rem 2rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.logo { font-size: 18px; font-weight: 700; }
.logo span { color: var(--accent); }
.live-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.container { max-width: 1300px; margin: 0 auto; padding: 1.5rem 2rem; }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
.stat-card .lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 5px; }
.stat-card .val { font-size: 28px; font-weight: 700; }
.stat-card .sub { font-size: 10px; color: var(--muted); margin-top: 3px; }

.controls { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
.controls input { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; color: var(--text); font-family: inherit; font-size: 13px; outline: none; flex: 1; min-width: 200px; }
.controls input:focus { border-color: var(--accent); }
.controls input::placeholder { color: var(--muted); }
.fbtn { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; color: var(--muted); font-family: inherit; font-size: 12px; cursor: pointer; white-space: nowrap; }
.fbtn.on, .fbtn:hover { border-color: var(--accent); color: var(--accent); background: rgba(124,106,255,.1); }

.sec-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
.node-table { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.tbl-head { display: grid; grid-template-columns: 40px 1fr 80px 90px 80px 100px; gap: 8px; padding: 10px 16px; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); }
.nrow { display: grid; grid-template-columns: 40px 1fr 80px 90px 80px 100px; gap: 8px; padding: 10px 16px; border-bottom: 1px solid var(--border); align-items: center; cursor: pointer; user-select: none; }
.nrow:last-child { border-bottom: none; }
.nrow:hover { background: rgba(124,106,255,.07); }
.nrow:active { background: rgba(124,106,255,.15); }
.nname { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; pointer-events: none; }
.nname.me { color: var(--accent); }
.tag { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 600; pointer-events: none; }
.tag.GPU { background: rgba(29,185,106,.15); color: var(--gpu); }
.tag.CPU { background: rgba(55,138,221,.15); color: var(--cpu); }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; pointer-events: none; }
.dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); }
.dot.off { background: var(--red); }
.ipt { font-size: 11px; color: var(--muted); pointer-events: none; }

.pgn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 1rem; }
.pbtn { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; color: var(--muted); font-family: inherit; font-size: 12px; cursor: pointer; }
.pbtn:hover { border-color: var(--accent); color: var(--accent); }
.pbtn:disabled { opacity: .3; cursor: not-allowed; }
.pginfo { font-size: 12px; color: var(--muted); }
.empty { text-align: center; padding: 3rem; color: var(--muted); }

footer { text-align: center; padding: 1.5rem; color: var(--muted); font-size: 12px; border-top: 1px solid var(--border); margin-top: 2rem; }
footer a { color: var(--accent); text-decoration: none; }

/* MODAL */
#overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.75); z-index: 999;
  align-items: center; justify-content: center;
  padding: 1rem; backdrop-filter: blur(3px);
}
#overlay.show { display: flex; }
#mbox {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; max-width: 620px; width: 100%;
  max-height: 90vh; overflow-y: auto; padding: 1.5rem;
  position: relative;
}
#mclose {
  position: absolute; top: 10px; right: 12px;
  background: none; border: none; color: var(--muted);
  font-size: 22px; cursor: pointer; line-height: 1; padding: 4px 8px;
}
#mclose:hover { color: var(--text); }
.mhead { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.2rem; gap: 10px; }
.mname { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.mname.me { color: var(--accent); }
.msub { font-size: 11px; color: var(--muted); word-break: break-all; margin-top: 4px; }
.mgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
.mcard { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
.mcard .lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
.mcard .val { font-size: 24px; font-weight: 700; }
.mcard .sub { font-size: 10px; color: var(--muted); margin-top: 3px; }
.mstatus { font-size: 12px; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; }
.logs-title { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
.logs-box { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; max-height: 220px; overflow-y: auto; }
.log-line { padding: 4px 0; border-bottom: 1px solid var(--border); display: flex; gap: 10px; font-size: 11px; }
.log-line:last-child { border-bottom: none; }
.log-t { color: var(--accent); flex-shrink: 0; font-weight: 600; }
.log-m { color: var(--muted); word-break: break-all; line-height: 1.5; }
.mnote { padding: 10px 12px; color: var(--muted); font-size: 11px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; }

@media (max-width: 700px) {
  .tbl-head, .nrow { grid-template-columns: 30px 1fr 60px 70px; }
  .tbl-head > *:nth-child(n+5), .nrow > *:nth-child(n+5) { display: none; }
  .container { padding: 1rem; }
}
</style>
</head>
<body>

<header>
  <div class="logo">Quip<span>Stats</span> <span style="font-size:12px;color:var(--muted);font-weight:400">Live</span></div>
  <div class="live-badge"><div class="live-dot"></div><span id="upd">Loading...</span></div>
</header>

<div class="container">
  <div class="stats-grid" id="sgrid">
    <div class="stat-card"><div class="lbl">Total Nodes</div><div class="val" style="color:var(--text)">—</div></div>
    <div class="stat-card"><div class="lbl">Active Now</div><div class="val" style="color:var(--green)">—</div></div>
    <div class="stat-card"><div class="lbl">GPU Active</div><div class="val" style="color:var(--gpu)">—</div></div>
    <div class="stat-card"><div class="lbl">CPU Active</div><div class="val" style="color:var(--cpu)">—</div></div>
    <div class="stat-card"><div class="lbl">Offline</div><div class="val" style="color:var(--red)">—</div></div>
  </div>

  <div class="controls">
    <input id="srch" type="text" placeholder="Search node name or IP..." />
    <button class="fbtn on"  id="f-all">All</button>
    <button class="fbtn"     id="f-active">Active</button>
    <button class="fbtn"     id="f-gpu">GPU</button>
    <button class="fbtn"     id="f-cpu">CPU</button>
    <button class="fbtn"     id="f-offline">Offline</button>
  </div>

  <div class="sec-title" id="ttl">All Nodes</div>
  <div class="node-table">
    <div class="tbl-head">
      <div></div><div>Node</div><div>Type</div><div>Resources</div><div>Status</div><div>IP</div>
    </div>
    <div id="nlist"><div class="empty">Fetching live data...</div></div>
  </div>
  <div class="pgn" id="pgn"></div>
</div>

<footer>
  Built by <a href="https://twitter.com/cryptobhartiyax" target="_blank">@cryptobhartiyax</a> &nbsp;·&nbsp;
  <a href="https://github.com/0xDarkSeidBull/quip_node_setup_guide" target="_blank">Node Setup Guide</a> &nbsp;·&nbsp;
  Data from live node logs · Auto-refreshes every 30s
</footer>

<!-- MODAL -->
<div id="overlay">
  <div id="mbox">
    <button id="mclose">✕</button>
    <div id="mbody"><div class="empty">Loading...</div></div>
  </div>
</div>

<script>
var API_NODES = 'https://api.republicstats.xyz/api/quip/nodes';
var API_LOCAL = 'https://api.republicstats.xyz/api/quip/node/local';
var PER_PAGE  = 50;

var allNodes = [];
var filtered = [];
var curPage  = 1;
var curFilt  = 'all';

// ── FETCH ──
function fetchData() {
  fetch(API_NODES)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      allNodes = data.nodes || [];
      document.getElementById('upd').textContent = 'Updated: ' + new Date().toLocaleTimeString();

      var active  = 0, gpu = 0, cpu = 0;
      for (var i = 0; i < allNodes.length; i++) {
        var n = allNodes[i];
        if (n.active) { active++; if (n.type==='GPU') gpu++; else cpu++; }
      }
      var offline = allNodes.length - active;

      document.getElementById('sgrid').innerHTML =
        mkCard('Total Nodes', allNodes.length.toLocaleString(), 'ever seen',   'var(--text)')  +
        mkCard('Active Now',  active.toLocaleString(),          'last 15 min', 'var(--green)') +
        mkCard('GPU Active',  gpu,                              'CUDA nodes',  'var(--gpu)')   +
        mkCard('CPU Active',  cpu,                              'CPU nodes',   'var(--cpu)')   +
        mkCard('Offline',     offline.toLocaleString(),         '>15 min ago', 'var(--red)');

      applyFilter();
    })
    .catch(function(err) {
      document.getElementById('nlist').innerHTML =
        '<div class="empty" style="color:var(--red)">Error: ' + err.message + '</div>';
    });
}

function mkCard(l, v, s, c) {
  return '<div class="stat-card"><div class="lbl">'+l+'</div><div class="val" style="color:'+c+'">'+v+'</div><div class="sub">'+s+'</div></div>';
}

// ── FILTER BUTTONS ──
var filterBtns = ['all','active','gpu','cpu','offline'];
for (var fi = 0; fi < filterBtns.length; fi++) {
  (function(f) {
    document.getElementById('f-'+f).addEventListener('click', function() {
      curFilt = f; curPage = 1;
      for (var j = 0; j < filterBtns.length; j++) {
        document.getElementById('f-'+filterBtns[j]).classList.remove('on');
      }
      this.classList.add('on');
      applyFilter();
    });
  })(filterBtns[fi]);
}

document.getElementById('srch').addEventListener('input', function() {
  curPage = 1;
  applyFilter();
});

function applyFilter() {
  var q = document.getElementById('srch').value.toLowerCase();
  filtered = [];
  for (var i = 0; i < allNodes.length; i++) {
    var n = allNodes[i];
    var matchQ = !q || n.name.toLowerCase().indexOf(q) >= 0 || n.ip.toLowerCase().indexOf(q) >= 0;
    var matchF = curFilt==='all'     ? true :
                 curFilt==='active'  ? n.active :
                 curFilt==='gpu'     ? (n.active && n.type==='GPU') :
                 curFilt==='cpu'     ? (n.active && n.type==='CPU') :
                 curFilt==='offline' ? !n.active : true;
    if (matchQ && matchF) filtered.push(n);
  }
  var labels = {all:'All Nodes',active:'Active Nodes',gpu:'Active GPU Nodes',cpu:'Active CPU Nodes',offline:'Offline Nodes'};
  document.getElementById('ttl').textContent = labels[curFilt] + ' (' + filtered.length.toLocaleString() + ')';
  renderRows();
  renderPgn();
}

// ── RENDER ROWS ──
function isMe(n) {
  return n.name.toLowerCase().indexOf('darkseid') >= 0;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderRows() {
  var start = (curPage - 1) * PER_PAGE;
  var end   = Math.min(start + PER_PAGE, filtered.length);

  if (filtered.length === 0) {
    document.getElementById('nlist').innerHTML = '<div class="empty">No nodes found</div>';
    return;
  }

  var html = '';
  for (var i = start; i < end; i++) {
    var n   = filtered[i];
    var me  = isMe(n);
    var res = n.type==='GPU' ? (n.gpus+'GPU+'+n.cpus+'C') : (n.cpus > 0 ? n.cpus+' Cores' : '—');
    var ip  = n.ip === 'local' ? 'DarkSeidBull Node' : n.ip;

    html += '<div class="nrow" data-idx="'+i+'">' +
      '<div style="font-size:11px;color:var(--muted);pointer-events:none">'+(i+1)+'</div>' +
      '<div class="nname'+(me?' me':'')+'" title="'+esc(n.name)+'">'+(me?'⚡ ':'')+esc(n.name)+'</div>' +
      '<div><span class="tag '+n.type+'">'+n.type+'</span></div>' +
      '<div style="font-size:12px;pointer-events:none">'+res+'</div>' +
      '<div><span class="dot '+(n.active?'on':'off')+'"></span></div>' +
      '<div class="ipt">'+esc(ip)+'</div>' +
    '</div>';
  }

  document.getElementById('nlist').innerHTML = html;
}

// ── CLICK HANDLER ──
document.getElementById('nlist').addEventListener('click', function(e) {
  var el = e.target;
  // Walk up to find .nrow
  while (el && el !== this) {
    if (el.classList && el.classList.contains('nrow')) {
      var idx = parseInt(el.getAttribute('data-idx'), 10);
      if (!isNaN(idx) && filtered[idx]) {
        openModal(filtered[idx]);
      }
      return;
    }
    el = el.parentNode;
  }
});

// ── PAGINATION ──
function renderPgn() {
  var total = Math.ceil(filtered.length / PER_PAGE);
  if (total <= 1) { document.getElementById('pgn').innerHTML = ''; return; }
  document.getElementById('pgn').innerHTML =
    '<button class="pbtn" '+(curPage===1?'disabled':'')+' onclick="goPage('+(curPage-1)+')">← Prev</button>' +
    '<span class="pginfo">Page '+curPage+' of '+total+'</span>' +
    '<button class="pbtn" '+(curPage===total?'disabled':'')+' onclick="goPage('+(curPage+1)+')">Next →</button>';
}

function goPage(p) { curPage = p; renderRows(); renderPgn(); window.scrollTo(0,0); }

// ── MODAL ──
function openModal(node) {
  document.getElementById('overlay').classList.add('show');
  document.getElementById('mbody').innerHTML = '<div class="empty">Loading...</div>';

  if (isMe(node)) {
    fetch(API_LOCAL)
      .then(function(r) { return r.json(); })
      .then(function(d) { showLocalModal(d); })
      .catch(function(err) {
        document.getElementById('mbody').innerHTML =
          '<div style="color:var(--red);padding:1rem">Error: ' + err.message + '</div>';
      });
  } else {
    showRemoteModal(node);
  }
}

function showLocalModal(d) {
  var lastSeen = d.last_seen ? new Date(d.last_seen * 1000).toLocaleTimeString() : '—';
  var logs = (d.recent_logs || []).slice().reverse();
  var logsHtml = '';
  for (var i = 0; i < logs.length; i++) {
    logsHtml += '<div class="log-line"><span class="log-t">'+esc(logs[i].time)+'</span><span class="log-m">'+esc(logs[i].msg)+'</span></div>';
  }
  if (!logsHtml) logsHtml = '<span style="color:var(--muted)">No logs</span>';

  document.getElementById('mbody').innerHTML =
    '<div class="mhead">' +
      '<div>' +
        '<div class="mname me">⚡ '+esc(d.name)+'</div>' +
        '<div class="msub">'+esc(d.full_id)+'</div>' +
      '</div>' +
      '<span class="tag CPU" style="flex-shrink:0">'+esc(d.type)+' · '+esc(d.version)+'</span>' +
    '</div>' +
    '<div class="mgrid">' +
      mkMcard('Blocks Mined', d.blocks_mined,      'avg '+d.avg_block_time+'s / block', 'var(--text)')  +
      mkMcard('Best Energy',  d.best_energy||'—',   'lower = better',                   'var(--gpu)')   +
      mkMcard('CPU Miners',   d.active_miners,      'active workers',                   'var(--cpu)')   +
      mkMcard('Uptime',       d.uptime_pct+'%',     d.version,                          'var(--green)') +
    '</div>' +
    '<div class="mstatus">' +
      '<span class="dot '+(d.active?'on':'off')+'"></span>' +
      '<span style="color:'+(d.active?'var(--green)':'var(--red)')+'"> '+(d.active?'Online':'Offline')+'</span>' +
      '<span style="color:var(--muted)"> · Last seen: '+lastSeen+'</span>' +
    '</div>' +
    '<div class="logs-title">Recent Logs</div>' +
    '<div class="logs-box">'+logsHtml+'</div>';
}

function showRemoteModal(n) {
  var lastSeen = n.last_seen ? new Date(n.last_seen * 1000).toLocaleTimeString() : '—';
  var res = n.type==='GPU' ? (n.gpus+' GPU + '+n.cpus+' Cores') : ((n.cpus||'—')+' CPU Cores');

  document.getElementById('mbody').innerHTML =
    '<div class="mhead">' +
      '<div>' +
        '<div class="mname">'+esc(n.name)+'</div>' +
        '<div class="msub">'+esc(n.ip)+'</div>' +
      '</div>' +
      '<span class="tag '+n.type+'" style="flex-shrink:0">'+n.type+'</span>' +
    '</div>' +
    '<div class="mgrid">' +
      mkMcard('Resources', res,                    '',  'var(--cpu)')  +
      mkMcard('Status',    n.active?'Online':'Offline', '', n.active?'var(--green)':'var(--red)') +
      mkMcard('Last Seen', lastSeen,               '',  'var(--text)') +
      mkMcard('Type',      n.type,                 '',  'var(--text)') +
    '</div>' +
    '<div class="mnote">ℹ️ Detailed mining stats available only for locally monitored nodes.</div>';
}

function mkMcard(l, v, s, c) {
  return '<div class="mcard"><div class="lbl">'+l+'</div><div class="val" style="color:'+c+'">'+esc(String(v))+'</div>'+(s?'<div class="sub">'+s+'</div>':'')+'</div>';
}

function closeModal() {
  document.getElementById('overlay').classList.remove('show');
}

document.getElementById('mclose').addEventListener('click', closeModal);
document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

// ── START ──
fetchData();
setInterval(fetchData, 30000);
</script>
</body>
</html>
